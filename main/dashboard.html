<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crawler Engine</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root {
            --bg: #000000;
            --bg-card: #0a0a0a;
            --border: rgba(255, 255, 255, 0.12);
            --border-hover: rgba(255, 255, 255, 0.2);
            --text: #ededed;
            --text-muted: #888888;
            --accent: #ffffff;
            --accent-fg: #000000;
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased; }
        
        svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
        
        /* Navbar */
        .navbar { display:flex; align-items:center; border-bottom:1px solid var(--border); padding:0 32px; height:64px; position: sticky; top:0; background: rgba(0,0,0,0.8); backdrop-filter: blur(16px); z-index: 50; }
        .logo { font-size:15px; font-weight:600; margin-right:48px; display:flex; align-items:center; gap:10px; letter-spacing:-0.2px; }
        .logo svg { width: 20px; height: 20px; stroke-width: 2; }
        .nav-tabs { display:flex; gap:8px; height:100%; }
        .nav-tab { padding:0 12px; display:flex; align-items:center; gap:8px; font-size:13px; font-weight:500; color:var(--text-muted); cursor:pointer; transition:all .2s; border-radius: 6px; margin: 12px 0; }
        .nav-tab:hover { color:var(--text); background: rgba(255,255,255,0.05); }
        .nav-tab.active { color:var(--text); background: rgba(255,255,255,0.1); }
        .nav-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
        .status-dot { width:8px; height:8px; border-radius:50%; background:var(--success); box-shadow: 0 0 12px rgba(16,185,129,0.6); }
        .status-text { font-size:12px; color:var(--text-muted); font-weight: 500; }

        /* Stats Bar */
        .stats-bar { display:flex; align-items:center; gap:40px; padding:20px 32px; border-bottom:1px solid var(--border); font-size:13px; background: rgba(255,255,255,0.02); }
        .stat { display:flex; flex-direction: column; gap:6px; color:var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .stat b { color:var(--text); font-weight:600; font-size:18px; letter-spacing:-0.5px; font-variant-numeric: tabular-nums; }
        .spacer { flex:1; }
        .btn-clear { background:transparent; color:var(--danger); border:1px solid var(--border); padding:6px 12px; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; transition:all .2s; display:flex; align-items:center; gap:6px; }
        .btn-clear:hover { background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); }

        /* Container & Grid */
        .container { max-width:1040px; margin:0 auto; padding:48px 32px; }
        .tab-page { display:none; animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .tab-page.active { display:block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Card */
        .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 32px; margin-bottom: 24px; position: relative; overflow: hidden; }
        .card::before { content: ''; position: absolute; top:0; left:0; right:0; height:1px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent); }
        .card h2 { font-size:16px; font-weight:600; margin-bottom:28px; display:flex; align-items:center; gap:10px; letter-spacing:-0.2px; }
        
        /* Form */
        .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px 32px; }
        .fg { display:flex; flex-direction:column; gap:8px; }
        .fg.full { grid-column:1/-1; }
        .fg label { font-size:12px; font-weight:500; color:var(--text); }
        .fg input { background: transparent; border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; font-size: 14px; color: var(--text); outline: none; transition: border-color .2s, box-shadow .2s; font-family: inherit; }
        .fg input:focus { border-color: rgba(255,255,255,0.3); box-shadow: 0 0 0 3px rgba(255,255,255,0.05); }
        .fg input::placeholder { color: #555; }
        .fg .hint { font-size:12px; color:var(--text-muted); }
        
        .form-actions { margin-top: 32px; }
        .btn-start { background: var(--accent); color: var(--accent-fg); border: none; border-radius: 8px; padding: 12px 24px; font-weight: 500; font-size: 14px; cursor: pointer; transition: transform .1s, opacity .2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; width: 100%; }
        .btn-start:hover { opacity: 0.9; transform: scale(0.995); }
        .btn-start:disabled { opacity: 0.5; cursor: not-allowed; }
        .form-msg { text-align:center; margin-top:16px; font-size:13px; color:var(--text-muted); height: 20px; }

        /* Search */
        .search-row { display:flex; gap:12px; margin-bottom:24px; }
        .search-row input { flex:1; background:transparent; border:1px solid var(--border); border-radius:8px; padding:12px 16px; font-size:14px; color:var(--text); outline:none; transition: border-color .2s; font-family: inherit; }
        .search-row input:focus { border-color:rgba(255,255,255,0.3); }
        .search-row button { background:var(--accent); color:var(--accent-fg); border:none; border-radius:8px; padding:0 24px; font-weight:500; cursor:pointer; transition: opacity .2s; }
        .search-row button:hover { opacity: 0.9; }
        
        .empty-msg { text-align:center; padding:48px; color:var(--text-muted); font-size:13px; border: 1px dashed var(--border); border-radius: 8px; }

        /* Tables */
        .results-table { width:100%; border-collapse:collapse; font-size:13px; }
        .results-table th { text-align:left; padding:12px; color:var(--text-muted); font-weight:500; border-bottom:1px solid var(--border); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .results-table td { padding:14px 12px; border-bottom:1px solid rgba(255,255,255,0.05); color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:300px; }
        .results-table td a { color:var(--text); text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 4px; transition: text-decoration-color 0.2s; }
        .results-table td a:hover { text-decoration-color: var(--text); }
        .score-badge { background:rgba(255,255,255,0.1); color:var(--text); padding:4px 8px; border-radius:4px; font-weight:500; font-size:11px; font-variant-numeric: tabular-nums; }

        /* Status Metadata */
        .crawler-header { display:flex; align-items:center; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
        .crawler-id { font-size:20px; font-weight:600; color:var(--text); letter-spacing: -0.5px; }
        .badge { padding:4px 10px; border-radius:100px; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; display:inline-flex; align-items:center; gap:6px; }
        .badge::before { content:''; display:block; width:6px; height:6px; border-radius:50%; }
        .badge-active { background:rgba(16,185,129,0.1); color:var(--success); border:1px solid rgba(16,185,129,0.2); }
        .badge-active::before { background: var(--success); box-shadow: 0 0 8px currentColor; }
        .badge-done { background:rgba(255,255,255,0.1); color:var(--text); border:1px solid var(--border); }
        .badge-done::before { background: var(--text-muted); }
        
        .btn-sm { padding:6px 12px; border-radius:6px; font-size:12px; font-weight:500; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text); transition:all .2s; }
        .btn-sm:hover { background:var(--border); }
        .btn-stop { color:var(--danger); border-color:rgba(239,68,68,0.3); }
        .btn-stop:hover { background:rgba(239,68,68,0.1); border-color:var(--danger); }
        
        .meta-grid { display:grid; grid-template-columns:1fr 1fr 1fr; gap:20px; margin-bottom:32px; }
        .meta-item .meta-label { font-size:11px; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:6px; }
        .meta-item .meta-value { font-size:14px; color:var(--text); font-weight:400; }
        .meta-item .meta-value a { color:var(--text); text-decoration: underline; text-decoration-color: var(--border); text-underline-offset: 4px; }
        .meta-item .meta-value a:hover { text-decoration-color: var(--text); }
        
        .live-indicator { display:flex; align-items:center; gap:8px; font-size:12px; color:var(--text-muted); border-top: 1px solid var(--border); padding-top: 20px; }
        .live-indicator .dot { width:8px; height:8px; border-radius:50%; background:var(--text-muted); }
        .live-indicator.active .dot { background:var(--success); animation:pulse 2s infinite; }
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

        /* Progress Track */
        .progress-track { width:100%; height:4px; background:rgba(255,255,255,0.08); border-radius:4px; overflow:hidden; margin-bottom:12px; }
        .progress-fill { height:100%; background:var(--text); border-radius:4px; transition:width .4s ease; min-width:0%; }
        .progress-labels { display:flex; justify-content:space-between; font-size:12px; color:var(--text-muted); font-variant-numeric: tabular-nums; }

        /* Queue & Meter */
        .queue-grid { display:grid; grid-template-columns:auto 1fr; gap:48px; align-items: center; }
        .meter-wrap { display:flex; flex-direction:column; align-items:center; }
        .meter { width:120px; height:120px; position:relative; }
        .meter svg { width: 120px; height: 120px; transform:rotate(-90deg); stroke-width: 6; }
        .meter circle { fill:none; }
        .meter .track { stroke:rgba(255,255,255,0.08); }
        .meter .fill { stroke:var(--text); stroke-linecap:round; transition:stroke-dashoffset .4s ease; }
        .meter .center-val { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:24px; font-weight:600; letter-spacing: -1px; }
        .meter-label { margin-top:16px; font-size:12px; color:var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .bp-badge { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:6px; font-size:11px; font-weight:600; text-transform: uppercase; letter-spacing: 0.5px; border: 1px solid var(--border); color: var(--text-muted); }
        .bp-badge::before { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .bp-normal { color: var(--success); border-color: rgba(16,185,129,0.3); }
        .bp-moderate { color: #f59e0b; border-color: rgba(245,158,11,0.3); }
        .bp-high { color: var(--danger); border-color: rgba(239,68,68,0.3); }

        .refresh-bar { position:fixed; top:0; left:0; height:2px; background:rgba(255,255,255,0.2); transition:width 2s linear; z-index:100; }
    </style>
</head>
<body>
    <div class="refresh-bar" id="refreshBar"></div>

    <div class="navbar">
        <div class="logo">
            <svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
            Crawler
        </div>
        <div class="nav-tabs">
            <div class="nav-tab active" data-tab="create" onclick="switchTab('create')">
                <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Create
            </div>
            <div class="nav-tab" data-tab="search" onclick="switchTab('search')">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg> Search
            </div>
            <div class="nav-tab" data-tab="status" onclick="switchTab('status')">
                <svg viewBox="0 0 24 24"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg> Status
            </div>
        </div>
        <div class="nav-right">
            <div class="status-dot" id="statusDot"></div>
            <span class="status-text" id="statusText">Connecting...</span>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat">URLs Visited <b id="statVisited">0</b></div>
        <div class="stat">Words in DB <b id="statWords">0</b></div>
        <div class="stat">Active Crawlers <b id="statActive">0</b></div>
        <div class="stat">Total Created <b id="statTotal">0</b></div>
        <div class="spacer"></div>
        <button class="btn-clear" onclick="clearAll()">
            <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Clear Data
        </button>
    </div>

    <div class="container">
        <!-- Create Tab -->
        <div class="tab-page active" id="page-create">
            <div class="card" style="max-width: 600px; margin: 0 auto;">
                <h2>Create Crawler Worker</h2>
                <div class="form-grid">
                    <div class="fg full">
                        <label>Origin URL</label>
                        <input type="text" id="fOrigin" placeholder="https://go.dev" value="https://go.dev">
                    </div>
                    <div class="fg">
                        <label>Max Depth / Hops</label>
                        <input type="number" id="fDepth" value="2" min="1" max="10">
                    </div>
                    <div class="fg">
                        <label>Workers</label>
                        <input type="number" id="fWorkers" value="5" min="1" max="20">
                    </div>
                    <div class="fg">
                        <label>Hit Rate (/sec)</label>
                        <input type="number" id="fHitRate" value="0" min="0" step="0.5">
                        <div class="hint">0 = unlimited</div>
                    </div>
                    <div class="fg">
                        <label>Queue Capacity</label>
                        <input type="number" id="fQueueCap" value="1000" min="0">
                        <div class="hint">0 = default</div>
                    </div>
                    <div class="fg full">
                        <label>Max URLs to Visit</label>
                        <input type="number" id="fMaxURLs" value="100" min="0">
                        <div class="hint">Total pages to crawl (0 = unlimited)</div>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-start" id="btnStart" onclick="createCrawler()">Start Crawling</button>
                </div>
                <div class="form-msg" id="formMsg"></div>
            </div>
        </div>

        <!-- Search Tab -->
        <div class="tab-page" id="page-search">
            <div class="card">
                <h2>Query Index</h2>
                <div class="search-row">
                    <input type="text" id="searchInput" placeholder="Search keywords...">
                    <button onclick="doSearch()">Search</button>
                </div>
                <div id="resultsContainer">
                    <div class="empty-msg">No queries yet. Enter a keyword to search.</div>
                </div>
            </div>
        </div>

        <!-- Status Tab -->
        <div class="tab-page" id="page-status">
            <div id="crawlerStatusContent">
                <div class="empty-msg" id="noCrawlerMsg">No crawlers found.</div>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        const REFRESH_MS = 2000;
        let lastData = null;

        function switchTab(id) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.nav-tab[data-tab="${id}"]`).classList.add('active');
            document.querySelectorAll('.tab-page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-' + id).classList.add('active');
        }

        async function fetchStatus() {
            try {
                const r = await fetch(API + '/status');
                const d = await r.json();
                lastData = d;
                updateStats(d);
                updateCrawlerStatus(d);
                document.getElementById('statusDot').style.background = 'var(--success)';
                document.getElementById('statusDot').style.boxShadow = '0 0 12px rgba(16,185,129,0.6)';
                document.getElementById('statusText').textContent = 'Live';
            } catch {
                document.getElementById('statusDot').style.background = 'var(--danger)';
                document.getElementById('statusDot').style.boxShadow = '0 0 12px rgba(239,68,68,0.6)';
                document.getElementById('statusText').textContent = 'Offline';
            }
        }

        function updateStats(d) {
            document.getElementById('statVisited').textContent = (d.pages_crawled || 0).toLocaleString();
            document.getElementById('statWords').textContent = (d.unique_tokens || 0).toLocaleString();
            document.getElementById('statActive').textContent = d.active_crawlers || 0;
            document.getElementById('statTotal').textContent = d.total_created || 0;
        }

        function updateCrawlerStatus(d) {
            const wrap = document.getElementById('crawlerStatusContent');
            if (d.total_created === 0) {
                wrap.innerHTML = '<div class="empty-msg">No crawlers found.</div>';
                return;
            }

            const isActive = d.active_crawlers > 0;
            const badgeClass = isActive ? 'badge-active' : 'badge-done';
            const badgeText = isActive ? 'Active' : 'Completed';
            const pct = d.urls_queued > 0 ? Math.round((d.urls_processed / d.urls_queued) * 100) : 0;
            const maxQ = d.queue_capacity || 10000;
            const ratio = Math.min((d.queue_depth || 0) / maxQ, 1);
            const circ = 314;
            const offset = circ * (1 - ratio);
            
            let arcColor = 'var(--text)';
            let bpClass = 'bp-normal', bpText = 'Normal Load';
            const bp = d.back_pressure || '';
            if (bp.startsWith('HIGH')) { arcColor = 'var(--danger)'; bpClass = 'bp-high'; bpText = bp; }
            else if (bp.startsWith('MODERATE')) { arcColor = '#f59e0b'; bpClass = 'bp-moderate'; bpText = bp; }

            wrap.innerHTML = `
                <div class="card">
                    <div class="crawler-header">
                        <span class="crawler-id">Worker #${d.total_created}</span>
                        <span class="badge ${badgeClass}">${badgeText}</span>
                        ${isActive ? '<button class="btn-sm btn-stop" onclick="stopCrawler()">Terminate</button>' : ''}
                    </div>
                    <div class="meta-grid">
                        <div class="meta-item"><div class="meta-label">Origin URL</div><div class="meta-value"><a href="${esc(d.crawler_origin)}" target="_blank">${esc(d.crawler_origin)}</a></div></div>
                        <div class="meta-item"><div class="meta-label">Depth</div><div class="meta-value">${d.crawler_depth}</div></div>
                        <div class="meta-item"><div class="meta-label">Total Visited</div><div class="meta-value">${(d.pages_crawled||0).toLocaleString()} pages</div></div>
                        <div class="meta-item"><div class="meta-label">Started</div><div class="meta-value">${d.crawler_started||'—'}</div></div>
                        <div class="meta-item"><div class="meta-label">Last Updated</div><div class="meta-value">${d.crawler_last_update||'—'}</div></div>
                    </div>
                    <div class="live-indicator ${isActive ? 'active' : ''}">
                        <span class="dot"></span> ${isActive ? 'Polling real-time updates...' : 'Worker inactive.'}
                    </div>
                </div>

                <div class="card">
                    <h2>Progress Phase</h2>
                    <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
                    <div class="progress-labels"><span>${(d.urls_processed||0).toLocaleString()} Processed</span><span>${pct}%</span><span>${(d.urls_queued||0).toLocaleString()} Queued</span></div>
                </div>

                <div class="card">
                    <h2>Queue State</h2>
                    <div class="queue-grid">
                        <div class="meter-wrap">
                            <div class="meter">
                                <svg viewBox="0 0 120 120">
                                    <circle class="track" cx="60" cy="60" r="50"></circle>
                                    <circle class="fill" cx="60" cy="60" r="50" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" style="stroke:${arcColor}"></circle>
                                </svg>
                                <div class="center-val">${d.queue_depth||0}</div>
                            </div>
                            <div class="meter-label">Queue Depth</div>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:16px;">
                            <div>
                                <div class="meta-label" style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Throttling</div>
                                <div class="bp-badge ${bpClass}">${bpText}</div>
                            </div>
                            <div>
                                <div class="meta-label" style="font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">Max Capacity</div>
                                <div style="font-size:14px;color:var(--text)">${maxQ.toLocaleString()}</div>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        async function createCrawler() {
            const btn = document.getElementById('btnStart');
            btn.disabled = true;
            btn.textContent = 'Initializing...';
            try {
                const body = {
                    origin_url: document.getElementById('fOrigin').value.trim(),
                    max_depth: parseInt(document.getElementById('fDepth').value) || 2,
                    workers: parseInt(document.getElementById('fWorkers').value) || 5,
                    hit_rate: parseFloat(document.getElementById('fHitRate').value) || 0,
                    queue_capacity: parseInt(document.getElementById('fQueueCap').value) || 0,
                    max_urls: parseInt(document.getElementById('fMaxURLs').value) || 0,
                };
                const r = await fetch(API + '/crawl', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
                const d = await r.json();
                document.getElementById('formMsg').style.color = 'var(--text)';
                document.getElementById('formMsg').textContent = 'Worker successfully spawned.';
                setTimeout(() => switchTab('status'), 600);
            } catch (e) {
                document.getElementById('formMsg').style.color = 'var(--danger)';
                document.getElementById('formMsg').textContent = 'Error: ' + e.message;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Start Crawling';
            }
        }

        async function stopCrawler() {
            if(!confirm('Terminate the active worker?')) return;
            await fetch(API + '/stop', { method: 'POST' });
            fetchStatus();
        }

        async function clearAll() {
            if (!confirm('Purge all data from memory and storage? This action is irreversible.')) return;
            await fetch(API + '/clear', { method: 'POST' });
            fetchStatus();
        }

        async function doSearch() {
            const q = document.getElementById('searchInput').value.trim();
            if (!q) return;
            try {
                const r = await fetch(API + '/search?q=' + encodeURIComponent(q));
                const d = await r.json();
                renderResults(d);
            } catch {
                document.getElementById('resultsContainer').innerHTML = '<div class="empty-msg">Error retrieving index.</div>';
            }
        }

        function renderResults(data) {
            const c = document.getElementById('resultsContainer');
            if (!data.results || data.results.length === 0) {
                c.innerHTML = '<div class="empty-msg">No relevant documents found.</div>';
                return;
            }
            let h = '<div style="font-size:12px;color:var(--text-muted);margin-bottom:12px">' + data.count + ' documents found for <span style="color:var(--text)">"' + esc(data.query) + '"</span></div>';
            h += '<table class="results-table"><thead><tr><th>#</th><th>Document URL</th><th>Origin</th><th>Depth</th><th>Relevancy</th></tr></thead><tbody>';
            data.results.slice(0, 50).forEach((r, i) => {
                h += '<tr><td>' + (i+1) + '</td><td><a href="' + esc(r.relevant_url) + '" target="_blank">' + esc(trunc(r.relevant_url,55)) + '</a></td><td>' + esc(trunc(r.origin_url||'(seed)',45)) + '</td><td>' + r.depth + '</td><td><span class="score-badge">' + r.score + '</span></td></tr>';
            });
            h += '</tbody></table>';
            c.innerHTML = h;
        }

        function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
        function trunc(s, n) { return s && s.length > n ? s.slice(0, n) + '…' : (s || ''); }

        function startRefreshCycle() {
            const bar = document.getElementById('refreshBar');
            bar.style.transition = 'none'; bar.style.width = '0%';
            requestAnimationFrame(() => { bar.style.transition = 'width ' + (REFRESH_MS/1000) + 's linear'; bar.style.width = '100%'; });
        }

        fetchStatus();
        startRefreshCycle();
        setInterval(() => { fetchStatus(); startRefreshCycle(); }, REFRESH_MS);
    </script>
</body>
</html>
